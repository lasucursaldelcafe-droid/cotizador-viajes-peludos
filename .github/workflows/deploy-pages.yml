name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Firebase config
        run: node -e "
          const fs=require('fs');
          const c=JSON.parse(fs.readFileSync('deploy.config.json','utf8'));
          const f=c.firebase||{};
          const emails=(f.adminEmails||[]).map(e=>\"    '\"+e+\"'\").join(',\\n')||'';
          const js=\`/** Auto-generado en CI */\\nwindow.VP_FIREBASE_CONFIG={enabled:${f.enabled!==false},apiKey:'\${f.apiKey}',authDomain:'\${f.authDomain}',projectId:'\${f.projectId}',storageBucket:'\${f.storageBucket}',messagingSenderId:'\${f.messagingSenderId}',appId:'\${f.appId}',adminEmails:[\${emails}]};\\n\`;
          fs.writeFileSync('js/firebase-config.js',js);
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  firestore-rules:
    runs-on: ubuntu-latest
    if: ${{ secrets.FIREBASE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules,auth --project viajes-peludos-cotizador
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
