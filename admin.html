<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Admin | Ghost Specialty Coffee</title>
  <link rel="icon" href="assets/images/brand/logo-mark.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="js/firebase-config.js"></script>
</head>
<body class="admin-body">
  <div id="login-screen" class="admin-login-wrap">
    <form class="admin-login-card" id="adminLoginForm">
      <img class="admin-login-card__logo" src="assets/images/brand/logo-horizontal.png" alt="Ghost Specialty Coffee" width="220" height="64" decoding="async">
      <h1 class="admin-login-card__title">Panel de administración</h1>
      <p class="admin-login-card__sub">Mismo modelo que Más Café — edita tienda, productos y menú</p>
      <p class="admin-login__error" id="loginError" hidden></p>
      <label class="admin-field">
        <span>Usuario o correo</span>
        <input type="text" name="user" required placeholder="admin" autocomplete="username">
      </label>
      <label class="admin-field">
        <span>Contraseña</span>
        <input type="password" name="pin" required autocomplete="current-password">
      </label>
      <button type="submit" class="admin-btn admin-btn--primary admin-btn--block">Entrar</button>
      <p class="admin-login-card__hint">Usuario: <code>admin</code> · Contraseña: <code>ghost2026</code></p>
      <p class="admin-login-card__hint"><a href="tienda.html">Ver tienda</a> · <a href="index.html">Volver al sitio</a></p>
    </form>
  </div>

  <div id="app" class="admin-app hidden">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <img src="assets/images/brand/logo-mark.png" alt="" width="40" height="40" decoding="async">
        <div>
          <strong>Ghost</strong>
          <span>Administración</span>
        </div>
      </div>
      <nav class="admin-nav" id="sidebarNav" aria-label="Secciones admin"></nav>
      <div class="admin-sidebar__foot">
        <p id="adminUserEmail"></p>
        <p class="admin-sidebar__status" id="adminStorageBadge">Local</p>
        <button type="button" class="admin-nav-btn" id="adminPreviewSite">Ver sitio</button>
        <button type="button" class="admin-nav-btn" id="adminLogout">Cerrar sesión</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar__head">
          <nav class="admin-breadcrumb" id="panelBreadcrumb" aria-label="Ruta"></nav>
          <h1 id="panelTitle">Resumen</h1>
          <p class="admin-topbar__sub" id="panelSubtitle">Vista general del contenido publicado</p>
        </div>
        <div class="admin-topbar__actions" id="panelActions"></div>
      </header>
      <div id="panelRoot" class="admin-panel-root" aria-live="polite"></div>
    </main>
  </div>

  <script type="module" src="js/admin/dashboard.js"></script>
</body>
</html>
