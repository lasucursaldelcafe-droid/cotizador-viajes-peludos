<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7B2D8E">
  <title>Viajes Peludos — Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="viajes-peludos.css">
</head>
<body class="vp-login-page">
  <section id="loginConfigured" class="vp-auth-gate">
    <div class="vp-auth-card">
      <img src="assets/logo-viajes-peludos.png" alt="Viajes Peludos" class="vp-auth-logo">
      <h1>Viajes Peludos</h1>
      <p>Inicia sesión con Google para acceder al cotizador.</p>
      <button type="button" class="btn btn-google" id="btnGoogleLogin">
        <span class="g-icon">G</span> Continuar con Google
      </button>
      <p class="vp-muted vp-auth-note">Después del login irás al editor de cotizaciones.</p>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="js/vp-routes.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/vp-auth.js"></script>
  <script src="js/vp-login-page.js"></script>
</body>
</html>
